services:
  spark-master:
    image: apache/spark:3.5.3
    container_name: my-spark-master
    hostname: spark-master
    command: [ "/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master" ]
    ports:
      - "8080:8080" # Spark Master Web UI
      - "7077:7077" # Spark Master communication port
      - "4040:4040" # Spark Application Web UI
    volumes:
      # Mount project directories into Spark's working directory so that
      # relative paths (src/, input/, outputs/) resolve correctly when running:
      #   cd /opt/spark && spark-submit src/taskN.py
      - ./src:/opt/spark/src
      - ./input:/opt/spark/input
      - ./outputs:/opt/spark/outputs
    user: root

  spark-worker-1:
    image: apache/spark:3.5.3
    container_name: spark-worker-1
    hostname: spark-worker-1
    command: [ "/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077" ]
    depends_on:
      - spark-master
    ports:
      - "8081:8081" # Worker Web UI
    environment:
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=1g
    volumes:
      - ./input:/opt/spark/input
      - ./outputs:/opt/spark/outputs
    user: root

  spark-worker-2:
    image: apache/spark:3.5.3
    container_name: spark-worker-2
    hostname: spark-worker-2
    command: [ "/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077" ]
    depends_on:
      - spark-master
    ports:
      - "8082:8081" # Worker Web UI (mapped to host port 8082 to avoid conflict)
    environment:
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=1g
    volumes:
      - ./input:/opt/spark/input
      - ./outputs:/opt/spark/outputs
    user: root

  spark-history-server:
    image: apache/spark:3.5.3
    container_name: spark-history-server
    hostname: spark-history-server
    command: [ "/opt/spark/bin/spark-class", "org.apache.spark.deploy.history.HistoryServer" ]
    depends_on:
      - spark-master
    ports:
      - "18080:18080" # Spark History Server Web UI
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=/opt/spark/logs -Dspark.history.ui.port=18080
    volumes:
      - ./spark-logs:/opt/spark/logs
    user: root
